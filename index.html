<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Онлайн запись</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css?v=3">
</head>

<body>
    <div class="ambient-bg" aria-hidden="true">
        <div class="grain"></div>
    </div>

    <div class="app-wrapper">
        <header class="salon-header">
            <div class="salon-logo-placeholder">✨</div>
            <div class="salon-name" id="salon-name-display">Nail Studio Deluxe</div>
        </header>

        <div class="container">
            <div class="section-title">Выберите услугу</div>
            <div class="custom-select-wrapper" id="service-wrapper">
                <div class="custom-select-trigger" id="select-trigger">
                    <span id="select-label">Выберите услугу...</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="custom-options" id="custom-options">
                    <div class="search-container" id="search-container">
                        <input type="text" id="search-input" class="search-input" placeholder="Поиск услуг..."
                            autocomplete="off">
                    </div>
                    <div id="service-results"></div>
                </div>
            </div>

            <div class="section-title">Выберите дату</div>
            <div class="date-container" id="date-container">
                <div class="skeleton skeleton-date"></div>
                <div class="skeleton skeleton-date"></div>
                <div class="skeleton skeleton-date"></div>
                <div class="skeleton skeleton-date"></div>
                <div class="skeleton skeleton-date"></div>
                <div class="skeleton skeleton-date"></div>
                <div class="skeleton skeleton-date"></div>
            </div>

            <div class="section-title">Выберите время</div>
            <div class="time-grid" id="time-grid">
                <div class="skeleton skeleton-time"></div>
                <div class="skeleton skeleton-time"></div>
                <div class="skeleton skeleton-time"></div>
                <div class="skeleton skeleton-time"></div>
                <div class="skeleton skeleton-time"></div>
                <div class="skeleton skeleton-time"></div>
            </div>

            <div class="section-title">Ваше имя</div>
            <div class="input-wrapper">
                <input type="text" id="name-input" class="text-input" placeholder="Иван" autocomplete="given-name">
            </div>

            <div class="section-title">Номер телефона</div>
            <div class="input-wrapper mb-24">
                <input type="tel" id="phone-input" class="text-input" placeholder="+7 (___) ___-__-__"
                    autocomplete="tel">
            </div>

            <div class="footer-note">
                Нажимая "Подтвердить запись", вы соглашаетесь с условиями обработки персональных данных.
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="confirm-modal" aria-hidden="true">
        <div class="modal-card">
            <h3 class="modal-title">Подтверждение</h3>
            <div class="modal-summary">
                <p>Услуга: <span id="modal-service"></span></p>
                <p>Дата: <span id="modal-date"></span></p>
                <p>Время: <span id="modal-time"></span></p>
                <p>Имя: <span id="modal-name"></span></p>
                <p>Телефон: <span id="modal-phone"></span></p>
            </div>
            <div class="modal-actions">
                <button class="modal-btn cancel" id="modal-cancel">Отмена</button>
                <button class="modal-btn submit" id="modal-submit">Записаться</button>
            </div>
        </div>
    </div>

    <div class="success-screen" id="success-screen">
        <div class="success-card">
            <div class="success-icon">
                <svg viewBox="0 0 52 52">
                    <circle class="success-circle" cx="26" cy="26" r="25" fill="none" />
                    <path class="success-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8" />
                </svg>
            </div>
            <h2 class="success-title">Вы записаны!</h2>
            <div class="success-summary">
                <p>Услуга: <span id="success-service"></span></p>
                <p>Дата: <span id="success-date"></span></p>
                <p>Время: <span id="success-time"></span></p>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>

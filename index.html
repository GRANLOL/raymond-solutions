<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Онлайн Запись</title>

    <!-- Telegram WebApp JS library -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Premium Animated Background Layers -->
    <div class="ambient-bg" aria-hidden="true">
        <div class="grain"></div>
    </div>

    <!-- Mobile Wrapper constraint for desktop viewing -->
    <div class="app-wrapper">

        <!-- 1. Dynamic Header Placeholder -->
        <header class="salon-header">
            <div class="salon-logo-placeholder">✨</div>
            <div class="salon-name" id="salon-name-display">Nail Studio Deluxe</div>
        </header>

        <div class="container">
            <!-- 2. Animated Custom Service Selection -->
            <div class="section-title">Выберите услугу</div>
            <div class="custom-select-wrapper" id="service-wrapper">
                <div class="custom-select-trigger" id="select-trigger">
                    <span id="select-label">Выберите услугу...</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="custom-options" id="custom-options">
                    <!-- Options injected by JS -->
                </div>
            </div>

            <!-- 3. Date Selection -->
            <div class="section-title">Выберите дату</div>
            <div class="date-container" id="date-container">
                <!-- Dates will be populated dynamically -->
            </div>

            <!-- 4. Time Selection -->
            <div class="section-title">Выберите время</div>
            <div class="time-grid" id="time-grid">
                <!-- Times will be populated dynamically -->
            </div>

            <!-- 5. Phone Input -->
            <div class="section-title">Номер телефона</div>
            <div class="phone-input-wrapper">
                <input type="tel" id="phone-input" class="phone-input" placeholder="+7 (999) 000-00-00"
                    autocomplete="tel">
            </div>

            <!-- 6. Footer -->
            <div class="footer-note">
                Нажимая "Подтвердить запись", вы соглашаетесь с условиями обработки персональных данных.
            </div>
        </div>
    </div>



    <script type="module" src="js/app.js"></script>
</body>

</html>
